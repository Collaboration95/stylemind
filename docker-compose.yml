services:
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-stylemind_secret}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-stylemind_secret}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1.5G"
        reservations:
          memory: "512M"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - backend
    command: >
      sh -c "
        python scripts/seed.py &&
        python scripts/embed.py &&
        python -m uvicorn stylemind.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
        reservations:
          memory: "512M"

  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-changeme_langfuse_db}
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  langfuse-server:
    image: langfuse/langfuse:2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-changeme_langfuse_db}@langfuse-db:5432/langfuse"
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme_langfuse_nextauth}
      NEXTAUTH_URL: "http://localhost:3000"
      SALT: ${LANGFUSE_SALT:-changeme_langfuse_salt}
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

networks:
  backend:
    driver: bridge
  observability:
    driver: bridge

volumes:
  neo4j_data:
  langfuse_pg_data:
